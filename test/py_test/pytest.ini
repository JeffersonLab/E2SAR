[pytest]

# Test with modules: pytest -m b2b; pytest -m "unit or b2b"
markers =
    unit: Unit tests
    b2b: Back-to-back Segmentation & Reassembly tests without LB on localhost
    cp: Test the Control Plane functionality at method level
    lb-b2b: Tests with a real EJFAT FPGA LB on localhost
    fec_b2b: FEC back-to-back tests with controlled loss injection
    fec_b2b_jumbo: FEC back-to-back tests using MTU 9000 (jumbo frames); run separately to avoid CPU load interfering with other GC-recovery tests
